<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigHub – Forgot Password</title>
  <link rel="stylesheet" href="../css/gighub.css" />
</head>
<body>
  <div class="login-page">
    <nav class="login-navbar">
      <span class="login-navbar__name">GigHub</span>
      <div class="login-navbar__links">
        <a href="LandingPage.html" class="login-navbar__home">Home</a>
        <a href="login.html" class="login-navbar__signup">Sign In</a>
      </div>
    </nav>

    <div class="login-body">
      <div class="login-card">
        <h2 style="text-align:center;margin-bottom:8px;color:#1b3d7a;">Reset Password</h2>
        <p style="text-align:center;color:#7a8fa0;margin-bottom:20px;">Enter your username or email and we will send a reset OTP.</p>

        <div class="login-fields">
          <input class="login-input" id="identifier" type="text" placeholder="Username or Email" autocomplete="username" />
        </div>

        <p class="login-error" id="resetStatus" style="display:block;min-height:20px;visibility:hidden;"></p>
        <button class="login-btn" onclick="requestReset()">Send Reset OTP</button>
      </div>
    </div>
  </div>

  <script>
    function setResetStatus(message, isError) {
      const el = document.getElementById('resetStatus');
      el.textContent = message || '';
      el.style.visibility = message ? 'visible' : 'hidden';
      el.style.color = isError ? '#ef4444' : '#16a34a';
    }

    function requestReset() {
      const identifier = document.getElementById('identifier').value.trim();
      if (!identifier) {
        setResetStatus('Please enter your username or email.', true);
        return;
      }

      fetch('http://localhost:3000/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier })
      })
      .then(async res => {
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || 'Unable to send reset OTP.');
        setResetStatus(data.message, false);
        setTimeout(() => {
          window.location.href = 'reset-password.html?identifier=' + encodeURIComponent(identifier);
        }, 1000);
      })
      .catch(err => setResetStatus(err.message, true));
    }
  </script>
</body>
</html>
