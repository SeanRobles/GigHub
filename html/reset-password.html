<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigHub – Set New Password</title>
  <link rel="stylesheet" href="../css/gighub.css" />
</head>
<body>
  <div class="login-page">
    <nav class="login-navbar">
      <span class="login-navbar__name">GigHub</span>
      <div class="login-navbar__links">
        <a href="LandingPage.html" class="login-navbar__home">Home</a>
        <a href="login.html" class="login-navbar__signup">Sign In</a>
      </div>
    </nav>

    <div class="login-body">
      <div class="login-card">
        <h2 style="text-align:center;margin-bottom:8px;color:#1b3d7a;">Set a New Password</h2>
        <p style="text-align:center;color:#7a8fa0;margin-bottom:20px;">Enter the OTP sent to your email, then set a new password.</p>

        <div class="login-fields">
          <input class="login-input" id="identifier" type="text" placeholder="Username or Email" autocomplete="username" />
          <input class="login-input" id="otp" type="text" maxlength="6" inputmode="numeric" placeholder="6-digit OTP" autocomplete="one-time-code" />
          <input class="login-input" id="newPassword" type="password" minlength="6" placeholder="New Password" autocomplete="new-password" />
          <input class="login-input" id="confirmPassword" type="password" minlength="6" placeholder="Confirm Password" autocomplete="new-password" />
        </div>

        <p class="login-error" id="resetStatus" style="display:block;min-height:20px;visibility:hidden;"></p>
        <button class="login-btn" onclick="resetPassword()">Update Password</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const identifierFromQuery = params.get('identifier') || '';
    document.getElementById('identifier').value = identifierFromQuery;

    function setResetStatus(message, isError) {
      const el = document.getElementById('resetStatus');
      el.textContent = message || '';
      el.style.visibility = message ? 'visible' : 'hidden';
      el.style.color = isError ? '#ef4444' : '#16a34a';
    }

    function resetPassword() {
      const identifier = document.getElementById('identifier').value.trim();
      const otp = document.getElementById('otp').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!identifier) {
        setResetStatus('Please enter your username or email.', true);
        return;
      }
      if (!otp || !/^\d{6}$/.test(otp)) {
        setResetStatus('Please enter a valid 6-digit OTP.', true);
        return;
      }
      if (!newPassword || newPassword.length < 6) {
        setResetStatus('Password must be at least 6 characters.', true);
        return;
      }
      if (newPassword !== confirmPassword) {
        setResetStatus('Passwords do not match.', true);
        return;
      }

      fetch('http://localhost:3000/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier, otp, password: newPassword })
      })
      .then(async res => {
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || 'Unable to update password.');
        setResetStatus(data.message, false);
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1200);
      })
      .catch(err => setResetStatus(err.message, true));
    }
  </script>
</body>
</html>
